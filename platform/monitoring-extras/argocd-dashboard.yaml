apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-gitops-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: misbah-argocd-lab
data:
  argocd-gitops-dashboard.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"mappings": [], "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}}, "overrides": []},
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 0},
          "id": 1,
          "options": {"reduceOptions": {"values": false, "calcs": ["lastNotNull"], "fields": ""}, "orientation": "auto", "textMode": "auto", "colorMode": "value", "graphMode": "area", "justifyMode": "auto"},
          "pluginVersion": "10.0.0",
          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "count(argocd_app_info)", "refId": "A"}],
          "title": "Total Argo CD Applications",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"custom": {"align": "auto", "cellOptions": {"type": "auto"}, "inspect": false}, "mappings": [], "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}}, "overrides": []},
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 0},
          "id": 2,
          "options": {"showHeader": true},
          "pluginVersion": "10.0.0",
          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "sum by (sync_status) (argocd_app_info)", "format": "table", "instant": true, "refId": "A"}],
          "title": "Applications by Sync Status",
          "type": "table"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"custom": {"align": "auto", "cellOptions": {"type": "auto"}, "inspect": false}, "mappings": [], "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}}, "overrides": []},
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 0},
          "id": 3,
          "options": {"showHeader": true},
          "pluginVersion": "10.0.0",
          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "sum by (health_status) (argocd_app_info)", "format": "table", "instant": true, "refId": "A"}],
          "title": "Applications by Health Status",
          "type": "table"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"custom": {"align": "auto", "cellOptions": {"type": "auto"}, "inspect": false}, "mappings": [], "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}}, "overrides": []},
          "gridPos": {"h": 10, "w": 24, "x": 0, "y": 8},
          "id": 4,
          "options": {"showHeader": true},
          "pluginVersion": "10.0.0",
          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "argocd_app_info", "format": "table", "instant": true, "refId": "A"}],
          "title": "Argo CD Application Inventory",
          "type": "table"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["argocd", "gitops", "take-home"],
      "templating": {"list": []},
      "time": {"from": "now-30m", "to": "now"},
      "timepicker": {},
      "timezone": "",
      "title": "Argo CD GitOps Overview",
      "uid": "argocd-gitops-overview",
      "version": 1,
      "weekStart": ""
    }
